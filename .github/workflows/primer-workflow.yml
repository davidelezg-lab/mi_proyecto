name: Condiciones

on:
  push:
    branches:
      - main

jobs:
  condicion:
    runs-on: ubuntu-latest

    steps:
      - name: Paso siempre
        run: echo "Siempre se ejecuta"

      - name: Solo en main
        if: github.ref == 'refs/heads/main'
        run: echo "Solo main"

      - name: Solo en prueba
        if: github.ref == 'refs/heads/prueba'
        run: echo "Solo prueba"
