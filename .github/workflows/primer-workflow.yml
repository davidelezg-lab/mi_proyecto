name: Pipeline CI básico

on:
  push:
    branches: [ developer ]
  pull_request:
    branches: [ developer ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Simular test
        run: |
          echo "Ejecutando test..."
          if grep -q "ERROR" app.txt; then
            echo "Test FALLA"
            exit 1
          else
            echo "Test OK"
          fi
